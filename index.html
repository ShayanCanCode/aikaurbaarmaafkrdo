<!DOCTYPE html>
<html>
<head>
<title>Please Forgive Me 🥺</title>

<style>

body{
font-family:"Comic Sans MS", cursive;
text-align:center;
background:linear-gradient(#ffe6f0,#ffd6e7);
margin-top:120px;
overflow:hidden;
}

/* Hearts animation */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:floatUp 6s linear infinite;
opacity:0.7;
}

@keyframes floatUp{
0%{transform:translateY(0) scale(1);opacity:0.8;}
100%{transform:translateY(-100vh) scale(1.5);opacity:0;}
}

/* Petals */

.petal{
position:fixed;
top:-20px;
font-size:18px;
animation:fall 8s linear infinite;
opacity:0.7;
}

@keyframes fall{
0%{transform:translateY(-10px) rotate(0deg);}
100%{transform:translateY(100vh) rotate(360deg);}
}

h1{
color:#ff4d6d;
font-size:40px;
}

p{
font-size:20px;
color:#444;
}

button{
padding:15px 35px;
font-size:18px;
margin:10px;
cursor:pointer;
border:none;
border-radius:30px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.yes{
background:#ff6b9a;
color:white;
box-shadow:0 0 15px #ff6b9a;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #ff6b9a;}
to{box-shadow:0 0 25px #ff2e73;}
}

#noBtn{
background:#f2f2f2;
position:absolute;
}

img{
margin-top:20px;
border-radius:20px;
width:300px;
}

</style>
</head>

<body>

<h1>I'm really really sorry 🥺💗</h1>

<p>
I didn't mean to make you upset...  
You're really important to me 💐  
Please forgive me?
</p>

<button class="yes" onclick="yesClicked()">Okay, I forgive you 💕</button>
<button id="noBtn" onmouseover="moveButton()">No 😤</button>

<script>

/* Move No button */
function moveButton(){
let btn = document.getElementById("noBtn");

let x = Math.random() * (window.innerWidth - 120);
let y = Math.random() * (window.innerHeight - 120);

btn.style.left = x + "px";
btn.style.top = y + "px";
}

/* Yes clicked */
function yesClicked(){
document.body.innerHTML = `
<h1>YAYYYY 🥰💞</h1>
<p>I knew your heart was too sweet to stay mad at me 💗</p>

<h2>Thank you for forgiving me 🥺🌹</h2>

<img src="https://raw.githubusercontent.com/ShayanCanCode/aikaurbaarmaafkrdo/main/cat-rose.gif">

`;
}

/* Floating hearts */
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

},500);

/* Petals */
setInterval(()=>{
let petal=document.createElement("div");
petal.className="petal";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.fontSize=(15+Math.random()*15)+"px";
document.body.appendChild(petal);

setTimeout(()=>{petal.remove()},8000);

},900);

</script>

</body>
</html>
